[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
ffi = true
via_ir = true
optimizer = true
optimizer_runs = 44444444
bytecode_hash = "none"
gas_limit = "300000000"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "v4-core/=lib/v4-core/src/",
    "v4-periphery/=lib/v4-periphery/src/",
    "forge-std/=lib/forge-std/src/",
    "solmate/=lib/v4-core/lib/solmate/",
    "v4-test-utils/=lib/v4-core/test/utils/",
]
